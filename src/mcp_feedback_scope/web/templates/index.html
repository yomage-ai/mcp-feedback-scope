<!DOCTYPE html>
<html lang="zh-CN" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
    <link rel="stylesheet" href="/static/css/styles.css?v={{ build_time | default('dev') | replace(' ', '_') }}">
</head>
<body>
    <div class="waiting-layout">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="app-logo">F</div>
                <span class="app-title">Feedback System</span>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" disabled>
                    <span class="nav-icon">&#x2630;</span>
                    <span>工作区</span>
                </button>
                <button class="nav-item" disabled>
                    <span class="nav-icon">&#x276F;</span>
                    <span>命令</span>
                </button>
                <button class="nav-item" disabled>
                    <span class="nav-icon">&#x2637;</span>
                    <span>会话管理</span>
                </button>
                <button class="nav-item" disabled>
                    <span class="nav-icon">&#x2699;</span>
                    <span>设置</span>
                </button>
                <button class="nav-item" disabled>
                    <span class="nav-icon">&#x24D8;</span>
                    <span>关于</span>
                </button>
            </nav>
            <div class="sidebar-sessions">
                <div class="sessions-label">SESSIONS</div>
                <div class="sidebar-session-list">
                    <div style="padding: 12px 16px; color: var(--text-secondary); font-size: 12px; text-align: center;">
                        等待会话...
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main area with centered waiting content -->
        <main class="waiting-main">
            <!-- Connection status indicator -->
            <div class="connection-status-floating">
                <div class="connection-indicator" id="connectionIndicator"></div>
                <span id="connectionText">连接中...</span>
            </div>

            <div class="waiting-content">
                <h1 class="waiting-title">MCP Feedback Enhanced</h1>
                <p class="waiting-description">Web UI 交互式反馈收集工具</p>
                <div class="waiting-status">等待 MCP 服务调用以建立反馈会话...</div>
            </div>
        </main>
    </div>

    <script src="/static/js/i18n.js?v={{ build_time | default('dev') | replace(' ', '_') }}"></script>
    <script src="/static/js/modules/utils.js?v={{ build_time | default('dev') | replace(' ', '_') }}"></script>
    <script src="/static/js/modules/websocket-manager.js?v={{ build_time | default('dev') | replace(' ', '_') }}"></script>
    <script src="/static/js/modules/image-handler.js?v={{ build_time | default('dev') | replace(' ', '_') }}"></script>
    <script src="/static/js/modules/settings-manager.js?v={{ build_time | default('dev') | replace(' ', '_') }}"></script>
    <script src="/static/js/modules/ui-manager.js?v={{ build_time | default('dev') | replace(' ', '_') }}"></script>
    <script src="/static/js/app.js?v={{ build_time | default('dev') | replace(' ', '_') }}"></script>
</body>
</html>
